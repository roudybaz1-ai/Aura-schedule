<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Board Games | Schedule Manager</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent: #10b981;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .dashboard {
            width: 100%;
            max-width: 950px;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        h1 { margin: 0; font-size: 24px; color: var(--accent); }

        .nav-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        button {
            background: var(--border);
            color: var(--text-main);
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        button:hover { background: #475569; }
        .btn-save { background: var(--accent); color: white; }
        .btn-save:hover { background: #059669; }

        .week-display {
            font-weight: bold;
            color: var(--text-main);
            background: #0f172a;
            padding: 8px 12px;
            border-radius: 6px;
        }

        .employee-row {
            background: #151f32;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .employee-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px dashed var(--border);
        }

        .employee-name {
            font-size: 18px;
            font-weight: bold;
            color: var(--accent);
        }

        .employee-stats {
            display: flex;
            gap: 15px;
        }

        .stat-badge {
            background: #0f172a;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid var(--border);
        }

        .stat-badge span {
            color: var(--accent);
        }

        .grid-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        @media (max-width: 768px) {
            .grid-days { grid-template-columns: repeat(1, 1fr); }
            .employee-header { flex-direction: column; align-items: flex-start; gap: 10px; }
        }

        .day-box {
            background: var(--card-bg);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .day-label {
            font-size: 11px;
            font-weight: bold;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .time-input {
            width: 100%;
            background: #0f172a;
            border: 1px solid var(--border);
            color: white;
            padding: 4px;
            border-radius: 4px;
            font-size: 12px;
        }

        .off-checkbox {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: var(--text-dim);
            cursor: pointer;
            margin-top: 2px;
        }

        .is-off { opacity: 0.3; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="header">
            <div>
                <h1>Aura Board Games</h1>
                <p style="margin: 4px 0 0 0; color: var(--text-dim); font-size: 14px;">Weekly Schedule Manager</p>
            </div>
            <button class="btn-save" onclick="saveSchedule()">Save Schedule</button>
        </div>

        <div class="header" style="border: none; padding: 0; margin-bottom: 25px;">
            <div class="nav-controls">
                <button onclick="changeWeek(-4)">⏮ Month</button>
                <button onclick="changeWeek(-1)">◀ Week</button>
            </div>
            <div class="week-display" id="week-label">Week of: Loading...</div>
            <div class="nav-controls">
                <button onclick="changeWeek(1)">Week ▶</button>
                <button onclick="changeWeek(4)">Month ⏭</button>
            </div>
        </div>

        <div id="schedule-container"></div>
    </div>

    <script>
        const employees = ["Anna", "Christa", "Mira"]; 
        const days = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
        
        let currentMonday = getMonday(new Date());

        function getMonday(d) {
            d = new Date(d);
            let day = d.getDay(),
                diff = d.getDate() - day + (day == 0 ? -6 : 1); 
            return new Date(d.setDate(diff));
        }

        function formatDate(date) {
            return date.toISOString().split('T')[0];
        }

        function updateWeekLabel() {
            const endOfWeek = new Date(currentMonday);
            endOfWeek.setDate(endOfWeek.getDate() + 6);
            document.getElementById('week-label').innerText = `📅 ${currentMonday.toLocaleDateString(undefined, {month: 'short', day: 'numeric'})} - ${endOfWeek.toLocaleDateString(undefined, {month: 'short', day: 'numeric', year: 'numeric'})}`;
        }

        function calculateHours(fromStr, toStr, isOff) {
            if (isOff || !fromStr || !toStr) return 0;
            const [fromH, fromM] = fromStr.split(':').map(Number);
            const [toH, toM] = toStr.split(':').map(Number);
            let diffMs = (new Date(2000, 0, 1, toH, toM)) - (new Date(2000, 0, 1, fromH, fromM));
            if (diffMs < 0) diffMs += 24 * 60 * 60 * 1000; // handles overnight shifts
            return parseFloat((diffMs / (1000 * 60 * 60)).toFixed(2));
        }

        function getMonthHours(employeeName) {
            let totalMonthHours = 0;
            const targetMonth = currentMonday.getMonth();
            const targetYear = currentMonday.getFullYear();

            // Loop through all keys in localStorage to calculate totals for the active month
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith("schedule_")) {
                    const dateStr = key.replace("schedule_", "");
                    const keyDate = new Date(dateStr);
                    
                    if (keyDate.getMonth() === targetMonth && keyDate.getFullYear() === targetYear) {
                        const savedData = JSON.parse(localStorage.getItem(key)) || {};
                        days.forEach(day => {
                            const dayKey = `${employeeName}_${day}`;
                            const dayData = savedData[dayKey];
                            if (dayData) {
                                totalMonthHours += calculateHours(dayData.from, dayData.to, dayData.off);
                            }
                        });
                    }
                }
            }
            return totalMonthHours.toFixed(1);
        }

        function updateLiveHours(emp) {
            let weeklyTotal = 0;
            days.forEach(day => {
                const dayKey = `${emp}_${day}`;
                const offChecked = document.getElementById(`off_${dayKey}`).checked;
                const fromVal = document.getElementById(`from_${dayKey}`).value;
                const toVal = document.getElementById(`to_${dayKey}`).value;
                weeklyTotal += calculateHours(fromVal, toVal, offChecked);
            });

            document.getElementById(`weekly_total_${emp}`).innerText = weeklyTotal.toFixed(1);
        }

        function renderSchedule() {
            updateWeekLabel();
            const container = document.getElementById('schedule-container');
            container.innerHTML = '';

            const currentWeekKey = `schedule_${formatDate(currentMonday)}`;
            const savedData = JSON.parse(localStorage.getItem(currentWeekKey)) || {};

            employees.forEach(emp => {
                const empRow = document.createElement('div');
                empRow.className = 'employee-row';
                
                // Calculate weekly hours from saved data for structural base
                let weeklyTotalInitial = 0;
                days.forEach(day => {
                    const dayKey = `${emp}_${day}`;
                    const dayData = savedData[dayKey] || { from: "09:00", to: "17:00", off: false };
                    weeklyTotalInitial += calculateHours(dayData.from, dayData.to, dayData.off);
                });

                const monthTotal = getMonthHours(emp);

                empRow.innerHTML = `
                    <div class="employee-header">
                        <div class="employee-name">${emp}</div>
                        <div class="employee-stats">
                            <div class="stat-badge">Week Total: <span id="weekly_total_${emp}">${weeklyTotalInitial.toFixed(1)}</span> hrs</div>
                            <div class="stat-badge">Month Total: <span>${monthTotal}</span> hrs</div>
                        </div>
                    </div>
                `;

                const grid = document.createElement('div');
                grid.className = 'grid-days';

                days.forEach(day => {
                    const dayKey = `${emp}_${day}`;
                    const dayData = savedData[dayKey] || { from: "09:00", to: "17:00", off: false };

                    const dayBox = document.createElement('div');
                    dayBox.className = `day-box ${dayData.off ? 'is-off' : ''}`;
                    dayBox.id = `box_${dayKey}`;

                    dayBox.innerHTML = `
                        <div class="day-label">${day}</div>
                        <input type="time" class="time-input" id="from_${dayKey}" value="${dayData.from}" ${dayData.off ? 'disabled' : ''} onchange="updateLiveHours('${emp}')">
                        <input type="time" class="time-input" id="to_${dayKey}" value="${dayData.to}" ${dayData.off ? 'disabled' : ''} onchange="updateLiveHours('${emp}')">
                        <label class="off-checkbox">
                            <input type="checkbox" id="off_${dayKey}" ${dayData.off ? 'checked' : ''} onchange="toggleOff('${dayKey}', '${emp}')"> Day Off
                        </label>
                    `;
                    grid.appendChild(dayBox);
                });

                empRow.appendChild(grid);
                container.appendChild(empRow);
            });
        }

        function toggleOff(dayKey, emp) {
            const isChecked = document.getElementById(`off_${dayKey}`).checked;
            const dayBox = document.getElementById(`box_${dayKey}`);
            const fromInput = document.getElementById(`from_${dayKey}`);
            const toInput = document.getElementById(`to_${dayKey}`);

            if (isChecked) {
                dayBox.classList.add('is-off');
                fromInput.disabled = true;
                toInput.disabled = true;
            } else {
                dayBox.classList.remove('is-off');
                fromInput.disabled = false;
                toInput.disabled = false;
            }
            updateLiveHours(emp);
        }

        function saveSchedule() {
            const currentWeekKey = `schedule_${formatDate(currentMonday)}`;
            const dataToSave = {};
            
            employees.forEach(emp => {
                days.forEach(day => {
                    const dayKey = `${emp}_${day}`;
                    dataToSave[dayKey] = {
                        from: document.getElementById(`from_${dayKey}`).value,
                        to: document.getElementById(`to_${dayKey}`).value,
                        off: document.getElementById(`off_${dayKey}`).checked
                    };
                });
            });

            localStorage.setItem(currentWeekKey, JSON.stringify(dataToSave));
            alert("Schedule saved successfully!");
            renderSchedule(); // Refresh numbers and calculate month updates
        }

        function changeWeek(weeks) {
            currentMonday.setDate(currentMonday.getDate() + (weeks * 7));
            renderSchedule();
        }

        renderSchedule();
    </script>
</body>
</html>
