<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Board Games | Secure Schedule Manager</title>

    <link rel="apple-touch-icon" href="aura-logo.png">
    <link rel="icon" type="image/png" sizes="192x192" href="aura-logo.png">
    <link rel="icon" type="image/png" sizes="512x512" href="aura-logo.png">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Aura Roster">

    <style>
        :root {
            --bg-dark: #fdf2f8;
            --card-bg: #ffffff;
            --accent: #ec4899;
            --accent-hover: #db2777;
            --text-main: #1f2937;
            --text-dim: #6b7280;
            --border: #fbcfe8;
            --bg-row: #fff1f2;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Container wrappers to guarantee strict centering across viewport scales */
        .center-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
        }

        /* Login Screen */
        .login-screen {
            width: 100%;
            max-width: 380px;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(236, 72, 153, 0.15);
            border: 1px solid var(--border);
            text-align: center;
        }

        .login-screen h2 { margin-top: 0; color: var(--accent); }
        .login-group { margin-bottom: 16px; text-align: left; }
        .login-group label { display: block; font-weight: 600; margin-bottom: 6px; color: #9d174d; font-size: 14px; }
        .login-input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: white; color: var(--text-main); }
        .login-btn { width: 100%; padding: 10px; background: var(--accent); border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .login-btn:hover { background: var(--accent-hover); }
        .error-msg { color: #ef4444; font-size: 13px; font-weight: bold; margin-bottom: 12px; display: none; }

        /* Main Dashboard Layout */
        .dashboard {
            display: none;
            width: 100%;
            max-width: 1100px;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 10px 25px rgba(236, 72, 153, 0.15);
            border: 1px solid var(--border);
        }

        .header {
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        @media (min-width: 600px) {
            .header { flex-direction: row; justify-content: space-between; align-items: center; }
            body { padding: 20px; }
            .dashboard { padding: 24px; }
        }

        h1 { margin: 0; font-size: 22px; color: var(--accent); }

        .nav-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            width: 100%;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        @media (min-width: 600px) { .nav-controls { width: auto; } }

        button {
            background: #f472b6;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        button:hover { background: var(--accent-hover); }
        .btn-settings { background: #9d174d; }
        .btn-logout { background: #4b5563; }
        .btn-logout:hover { background: #374151; }

        .week-nav-bar {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            background: #fff1f2;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .week-btn-group { display: flex; gap: 6px; width: 100%; justify-content: space-between; }

        @media (min-width: 600px) {
            .week-nav-bar { flex-direction: row; justify-content: space-between; padding: 8px 12px; }
            .week-btn-group { width: auto; }
        }

        .week-display {
            font-weight: bold;
            color: #9d174d;
            background: #fce7f3;
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            text-align: center;
            font-size: 14px;
        }

        .employee-row {
            background: var(--bg-row);
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
        }

        .employee-header {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px dashed var(--border);
        }

        @media (min-width: 768px) { .employee-header { flex-direction: row; justify-content: space-between; align-items: center; } }

        .employee-name-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .employee-name { font-size: 18px; font-weight: bold; color: #9d174d; cursor: pointer; text-decoration: underline dashed rgba(157, 23, 77, 0.4); }
        .btn-toggle-panel { background: #fbcfe8; color: #9d174d; font-size: 11px; padding: 3px 8px; border-radius: 6px; cursor: pointer; display: none; font-weight: bold; }
        .btn-toggle-panel:hover { background: #f472b6; color: white; }

        .employee-stats { display: flex; gap: 6px; flex-wrap: wrap; }

        .stat-badge {
            background: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        .stat-badge span { color: var(--accent); }
        .stat-badge .overtime-pos { color: #10b981; }
        .stat-badge .overtime-neg { color: #ef4444; }

        .grid-days { display: grid; grid-template-columns: repeat(1, 1fr); gap: 10px; transition: all 0.2s ease-in-out; }
        @media (min-width: 480px) { .grid-days { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 768px) { .grid-days { grid-template-columns: repeat(4, 1fr); } }
        @media (min-width: 1024px) { .grid-days { grid-template-columns: repeat(7, 1fr); } }

        .day-box { background: white; padding: 10px; border-radius: 8px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; }
        .day-label { font-size: 12px; font-weight: bold; color: #db2777; text-transform: uppercase; border-bottom: 1px solid #fff1f2; padding-bottom: 2px; }
        .date-sub-label { font-size: 10px; color: var(--text-dim); margin-top: -4px; margin-bottom: 2px; }

        .time-input { width: 100%; background: #fff5f5; border: 1px solid var(--border); color: var(--text-main); padding: 4px; border-radius: 4px; font-size: 12px; height: 28px; }
        .time-input:disabled, .input-deduct:disabled, .note-input:disabled { background: #f3f4f6; color: #9ca3af; cursor: not-allowed; }

        .deduct-container { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #b91c1c; font-weight: 600; }
        .input-deduct { width: 45px; height: 24px; padding: 2px; border: 1px solid var(--border); border-radius: 4px; font-size: 11px; text-align: center; background: #fef2f2; color: #b91c1c; }

        .note-input { width: 100%; height: 40px; resize: none; font-size: 11px; padding: 4px; border: 1px solid var(--border); border-radius: 4px; background: #fafafa; color: var(--text-main); }
        .off-checkbox { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-dim); cursor: pointer; user-select: none; margin-top: 2px; }

        .is-off { opacity: 0.4; background: #f3f4f6; }

        .settings-panel { display: none; background: #fff1f2; border: 2px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 25px; }
        .settings-group { margin-bottom: 15px; }
        .settings-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #9d174d; font-size: 14px;}

        .input-text { padding: 8px; border: 1px solid var(--border); border-radius: 6px; width: 100%; max-width: 240px; margin-bottom: 8px; display: block; }
        .worker-list-item { display: flex; justify-content: space-between; align-items: center; background: white; padding: 8px 12px; border-radius: 6px; margin-bottom: 6px; border: 1px solid var(--border); max-width: 450px; flex-wrap: wrap; gap: 6px; }
        .pass-change-container { display: flex; gap: 4px; align-items: center; width: 100%; border-top: 1px dashed #fbcfe8; padding-top: 6px; margin-top: 4px; }
        .input-mini-pass { padding: 4px; font-size: 11px; border: 1px solid var(--border); border-radius: 4px; width: 110px; }

        /* Modal Layout */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); justify-content: center; align-items: center; padding: 10px; }
        .modal-content { background: white; padding: 16px; border-radius: 16px; width: 100%; max-width: 440px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid var(--border); max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; color: #9d174d; }
        .close-btn { font-size: 28px; font-weight: bold; color: var(--text-dim); cursor: pointer; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
        .calendar-day-header { font-size: 10px; font-weight: bold; color: var(--accent); padding: 4px 0; text-transform: uppercase; }
        .calendar-cell { background: #fff5f5; border: 1px solid var(--border); border-radius: 6px; min-height: 48px; padding: 2px; display: flex; flex-direction: column; justify-content: space-between; }
        .cell-num { font-size: 10px; font-weight: bold; color: var(--text-dim); text-align: left; }
        .cell-hrs { font-size: 9px; font-weight: 800; color: #10b981; text-align: center; background: white; border-radius: 4px; padding: 1px 0; border: 1px solid #fbcfe8; }
        .cell-empty { background: transparent; border: none; }
        .save-indicator { font-size: 11px; color: #10b981; font-weight: bold; margin-left: 8px; display: none; }

        /* Responsive Footer Styles */
        .app-footer {
            margin-top: auto;
            padding-top: 30px;
            padding-bottom: 15px;
            font-size: 12px;
            color: var(--text-dim);
            text-align: center;
            width: 100%;
            letter-spacing: 0.5px;
        }
        .app-footer strong {
            color: #9d174d;
        }
    </style>
</head>
<body>

    <div class="center-wrapper">
        <div id="login-container" class="login-screen">
            <h2>🎀 Aura Board Games</h2>
            <p style="color: var(--text-dim); font-size: 13px; margin-bottom: 20px;">Schedule Login</p>
            <div class="error-msg" id="login-error">Invalid Passkey Code!</div>
            
            <div class="login-group">
                <label>Select Your Profile:</label>
                <select id="login-username" class="login-input"></select>
            </div>
            <div class="login-group">
                <label>Passkey Access Code:</label>
                <input type="password" id="login-passkey" class="login-input" placeholder="••••">
            </div>
            <button class="login-btn" onclick="attemptLogin()">Access Dashboard</button>
        </div>

        <div id="app-container" class="dashboard">
            <div class="header">
                <div>
                    <h1 id="welcome-banner">🎀 Welcome</h1>
                    <p id="user-role-label" style="margin: 2px 0 0 0; color: var(--text-dim); font-size: 13px;">Live Schedule Dashboard</p>
                </div>
                <div class="nav-controls">
                    <span id="save-status" class="save-indicator">✓ Auto-saved</span>
                    <button id="admin-settings-btn" class="btn-settings" onclick="toggleSettings()" style="display:none;">⚙️ Settings</button>
                    <button class="btn-logout" onclick="logoutUser()">👤 Switch User / Logout</button>
                </div>
            </div>

            <div id="settings-panel" class="settings-panel">
                <h2 style="color: #9d174d; margin-top: 0; font-size: 16px;">Admin Settings Dashboard</h2>
                <hr style="border: none; border-top: 1px dashed var(--border); margin-bottom: 15px;">
                
                <div class="settings-group">
                    <label>Minimum Target Hours / Month:</label>
                    <input type="number" id="min-hours-input" class="input-text" value="120" onchange="updateMinHours(this.value)">
                </div>

                <div class="settings-group">
                    <label>Add New Team Member Roster Profile:</label>
                    <input type="text" id="new-name-input" class="input-text" placeholder="Full Name...">
                    <input type="text" id="new-pass-input" class="input-text" placeholder="Assign Passkey Code...">
                    <button onclick="addEmployee()">Add Member Profile</button>
                </div>

                <div class="settings-group">
                    <label>Manage Active Passkeys & Roster:</label>
                    <div id="settings-worker-list"></div>
                </div>
            </div>

            <div class="week-nav-bar">
                <div class="week-btn-group">
                    <button onclick="changeWeek(-4)">⏮ Mo</button>
                    <button onclick="changeWeek(-1)">◀ Wk</button>
                </div>
                <div class="week-display" id="week-label">Loading week...</div>
                <div class="week-btn-group">
                    <button onclick="changeWeek(1)">Wk ▶</button>
                    <button onclick="changeWeek(4)">Mo ⏭</button>
                </div>
            </div>

            <div id="schedule-container"></div>
        </div>
    </div>

    <div id="calendar-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title" style="margin:0; font-size: 16px;">Employee Calendar</h3>
                <span class="close-btn" onclick="closeModal()">&times;</span>
            </div>
            <div id="modal-month-name" style="font-weight: bold; color: var(--accent); margin-bottom: 12px; font-size: 13px;"></div>
            <div class="calendar-grid" id="modal-calendar-grid"></div>
        </div>
    </div>

    <footer class="app-footer">
        Aura Board Games Schedule App &bull; Developer: <strong>Roudy Baz</strong>
    </footer>

    <script>
        let employeePasskeys = JSON.parse(localStorage.getItem('aura_creds')) || { "Anna": "0000", "Christa": "1234", "Mira": "5678" };
        localStorage.setItem('aura_creds', JSON.stringify(employeePasskeys));

        let employees = JSON.parse(localStorage.getItem('aura_employees')) || ["Anna", "Christa", "Mira"];
        let minMonthlyHours = Number(localStorage.getItem('aura_min_hours')) || 120;
        
        let currentUser = null;
        let isAdmin = false;

        const days = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
        let currentMonday = getMonday(new Date());

        function getMonday(d) {
            d = new Date(d);
            let day = d.getDay();
            let diff = d.getDate() - day + (day == 0 ? -6 : 1); 
            let monday = new Date(d.setDate(diff));
            monday.setHours(0,0,0,0);
            return monday;
        }

        function formatDateString(date) { 
            let d = new Date(date),
                month = '' + (d.getMonth() + 1),
                day = '' + d.getDate(),
                year = d.getFullYear();
            if (month.length < 2) month = '0' + month;
            if (day.length < 2) day = '0' + day;
            return [year, month, day].join('-');
        }

        function updateWeekLabel() {
            const endOfWeek = new Date(currentMonday);
            endOfWeek.setDate(endOfWeek.getDate() + 6);
            document.getElementById('week-label').innerText = `📅 ${currentMonday.toLocaleDateString(undefined, {month: 'short', day: 'numeric'})} - ${endOfWeek.toLocaleDateString(undefined, {month: 'short', day: 'numeric', year: 'numeric'})}`;
        }

        function populateLoginDropdown() {
            const selectEl = document.getElementById('login-username');
            selectEl.innerHTML = '';
            employees.forEach(emp => {
                const opt = document.createElement('option');
                opt.value = emp;
                opt.innerText = emp;
                selectEl.appendChild(opt);
            });
        }

        function attemptLogin() {
            const userIn = document.getElementById('login-username').value;
            const passIn = document.getElementById('login-passkey').value.trim();
            const storedCreds = JSON.parse(localStorage.getItem('aura_creds'));

            if (storedCreds[userIn] && storedCreds[userIn] === passIn) {
                currentUser = userIn;
                isAdmin = (userIn.toLowerCase() === "anna");
                
                document.getElementById('login-error').style.display = 'none';
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                
                document.getElementById('welcome-banner').innerText = `🎀 Welcome, ${currentUser}`;
                document.getElementById('user-role-label').innerText = isAdmin ? "Administrator Dashboard Access" : "Staff Schedule Portal (Personal View Only)";
                document.getElementById('admin-settings-btn').style.display = isAdmin ? 'inline-flex' : 'none';

                document.getElementById('login-passkey').value = "";
                renderSchedule();
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        function logoutUser() {
            currentUser = null;
            isAdmin = false;
            document.getElementById('app-container').style.display = 'none';
            document.getElementById('settings-panel').style.display = 'none';
            document.getElementById('login-container').style.display = 'block';
            populateLoginDropdown();
        }

        function calculateHours(fromStr, toStr, isOff, breakMins) {
            if (isOff || !fromStr || !toStr) return 0;
            const [fromH, fromM] = fromStr.split(':').map(Number);
            const [toH, toM] = toStr.split(':').map(Number);
            let diffMs = (new Date(2000, 0, 1, toH, toM)) - (new Date(2000, 0, 1, fromH, fromM));
            if (diffMs < 0) diffMs += 24 * 60 * 60 * 1000;
            
            let totalHours = diffMs / (1000 * 60 * 60);
            if (breakMins && !isNaN(breakMins)) { totalHours -= (Number(breakMins) / 60); }
            return parseFloat(Math.max(0, totalHours).toFixed(2));
        }

        function getDayData(employeeName, dateStr) {
            const globalKey = `auradata_${employeeName}_${dateStr}`;
            const saved = localStorage.getItem(globalKey);
            if (saved) return JSON.parse(saved);
            return { from: "15:00", to: "01:00", off: false, breakMins: "0", notes: "" };
        }

        function saveDayData(employeeName, dateStr, data) {
            const globalKey = `auradata_${employeeName}_${dateStr}`;
            localStorage.setItem(globalKey, JSON.stringify(data));
        }

        function getWeeklyTotal(employeeName, startMonday) {
            let total = 0;
            let tempDate = new Date(startMonday);
            for(let i=0; i<7; i++) {
                let dStr = formatDateString(tempDate);
                let dayData = getDayData(employeeName, dStr);
                total += calculateHours(dayData.from, dayData.to, dayData.off, dayData.breakMins);
                tempDate.setDate(tempDate.getDate() + 1);
            }
            return total;
        }

        function getMonthHours(employeeName) {
            let totalMonthHours = 0;
            const targetMonth = currentMonday.getMonth();
            const targetYear = currentMonday.getFullYear();

            const totalDaysInMonth = new Date(targetYear, targetMonth + 1, 0).getDate();
            for (let d = 1; d <= totalDaysInMonth; d++) {
                let evalDate = new Date(targetYear, targetMonth, d);
                let dStr = formatDateString(evalDate);
                let dayData = getDayData(employeeName, dStr);
                totalMonthHours += calculateHours(dayData.from, dayData.to, dayData.off, dayData.breakMins);
            }
            return totalMonthHours;
        }

        function togglePanel(empName) {
            const grid = document.getElementById(`grid_holder_${empName}`);
            const btn = document.getElementById(`btn_toggle_${empName}`);
            if (grid.style.display === "none") {
                grid.style.display = "grid";
                btn.innerText = "Minimize ➖";
            } else {
                grid.style.display = "none";
                btn.innerText = "Expand ➕";
            }
        }

        function openCalendarView(emp) {
            const modal = document.getElementById('calendar-modal');
            document.getElementById('modal-title').innerText = `📊 ${emp}'s History`;
            const currentYear = currentMonday.getFullYear();
            const currentMonthIndex = currentMonday.getMonth();
            const monthLabel = currentMonday.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
            document.getElementById('modal-month-name').innerText = `Month Breakdown: ${monthLabel}`;

            const grid = document.getElementById('modal-calendar-grid');
            grid.innerHTML = '';

            const weekdaysMap = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
            weekdaysMap.forEach(h => {
                const head = document.createElement('div');
                head.className = 'calendar-day-header';
                head.innerText = h;
                grid.appendChild(head);
            });

            const firstDayOfMonth = new Date(currentYear, currentMonthIndex, 1);
            const lastDayOfMonth = new Date(currentYear, currentMonthIndex + 1, 0);
            
            let startDayOffset = firstDayOfMonth.getDay() - 1; 
            if (startDayOffset < 0) startDayOffset = 6; 

            for (let i = 0; i < startDayOffset; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'calendar-cell cell-empty';
                grid.appendChild(emptyCell);
            }

            const totalDays = lastDayOfMonth.getDate();
            for (let dayNum = 1; dayNum <= totalDays; dayNum++) {
                const evalDate = new Date(currentYear, currentMonthIndex, dayNum);
                const dStr = formatDateString(evalDate);
                const dayData = getDayData(emp, dStr);
                const dayHours = calculateHours(dayData.from, dayData.to, dayData.off, dayData.breakMins);

                const cell = document.createElement('div');
                cell.className = 'calendar-cell';
                let hourTagHtml = dayHours > 0 ? `<div class="cell-hrs">${dayHours}h</div>` : '';
                cell.innerHTML = `<div class="cell-num">${dayNum}</div>${hourTagHtml}`;
                grid.appendChild(cell);
            }
            modal.style.display = 'flex';
        }

        function closeModal() { document.getElementById('calendar-modal').style.display = 'none'; }
        window.onclick = function(event) { if (event.target == document.getElementById('calendar-modal')) { closeModal(); } }

        function handleLiveChange(emp, dateStr) {
            if (!isAdmin) return;

            const fromVal = document.getElementById(`from_${emp}_${dateStr}`).value;
            const toVal = document.getElementById(`to_${emp}_${dateStr}`).value;
            const offChecked = document.getElementById(`off_${emp}_${dateStr}`).checked;
            const breakVal = document.getElementById(`break_${emp}_${dateStr}`).value;
            const noteVal = document.getElementById(`note_${emp}_${dateStr}`).value;

            const updatedData = {
                from: fromVal,
                to: toVal,
                off: offChecked,
                breakMins: breakVal,
                notes: noteVal
            };

            saveDayData(emp, dateStr, updatedData);

            // Update DOM states immediately
            const dayBox = document.getElementById(`box_${emp}_${dateStr}`);
            const fromInput = document.getElementById(`from_${emp}_${dateStr}`);
            const toInput = document.getElementById(`to_${emp}_${dateStr}`);
            const breakInput = document.getElementById(`break_${emp}_${dateStr}`);

            if (offChecked) {
                dayBox.classList.add('is-off');
                fromInput.disabled = true; toInput.disabled = true; breakInput.disabled = true;
            } else {
                dayBox.classList.remove('is-off');
                fromInput.disabled = false; toInput.disabled = false; breakInput.disabled = false;
            }

            // Recalculate Badges
            const newWeekTotal = getWeeklyTotal(emp, currentMonday);
            document.getElementById(`weekly_total_${emp}`).innerText = newWeekTotal.toFixed(1);

            const monthTotal = getMonthHours(emp);
            document.getElementById(`monthly_total_${emp}`).innerText = monthTotal.toFixed(1);
            
            const extraTime = monthTotal - minMonthlyHours;
            const bankEl = document.getElementById(`bank_total_${emp}`);
            bankEl.innerText = (extraTime >= 0 ? '+' : '') + extraTime.toFixed(1);
            bankEl.className = extraTime >= 0 ? 'overtime-pos' : 'overtime-neg';

            // Auto save visual confirmation
            const statusLabel = document.getElementById('save-status');
            statusLabel.style.display = 'inline';
            setTimeout(() => { statusLabel.style.display = 'none'; }, 800);
        }
