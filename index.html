<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Board Games | Schedule Manager</title>
    <style>
        :root {
            --bg-dark: #fdf2f8;
            --card-bg: #ffffff;
            --accent: #ec4899;
            --accent-hover: #db2777;
            --text-main: #1f2937;
            --text-dim: #6b7280;
            --border: #fbcfe8;
            --bg-row: #fff1f2;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 12px;
            display: flex;
            justify-content: center;
        }

        .dashboard {
            width: 100%;
            max-width: 950px;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 10px 25px rgba(236, 72, 153, 0.15);
            border: 1px solid var(--border);
        }

        .header {
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        @media (min-width: 600px) {
            .header {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
            body { padding: 20px; }
            .dashboard { padding: 24px; }
        }

        h1 { margin: 0; font-size: 22px; color: var(--accent); }

        .nav-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            width: 100%;
            justify-content: space-between;
        }

        @media (min-width: 600px) {
            .nav-controls { width: auto; }
        }

        button {
            background: #f472b6;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        button:hover { background: var(--accent-hover); }
        .btn-settings { background: #9d174d; }

        .week-nav-bar {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            background: #fff1f2;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .week-btn-group {
            display: flex;
            gap: 6px;
            width: 100%;
            justify-content: space-between;
        }

        @media (min-width: 600px) {
            .week-nav-bar {
                flex-direction: row;
                justify-content: space-between;
                padding: 8px 12px;
            }
            .week-btn-group { width: auto; }
        }

        .week-display {
            font-weight: bold;
            color: #9d174d;
            background: #fce7f3;
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            text-align: center;
            font-size: 14px;
        }

        .employee-row {
            background: var(--bg-row);
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }

        .employee-header {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px dashed var(--border);
        }

        @media (min-width: 768px) {
            .employee-header {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }

        .employee-name {
            font-size: 18px;
            font-weight: bold;
            color: #9d174d;
            cursor: pointer;
            text-decoration: underline dashed rgba(157, 23, 77, 0.4);
        }

        .employee-stats {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .stat-badge {
            background: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        .stat-badge span { color: var(--accent); }
        .stat-badge .overtime-pos { color: #10b981; }
        .stat-badge .overtime-neg { color: #ef4444; }

        .grid-days {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        @media (min-width: 480px) { .grid-days { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 768px) { .grid-days { grid-template-columns: repeat(7, 1fr); } }

        .day-box {
            background: white;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .day-label {
            font-size: 11px;
            font-weight: bold;
            color: #db2777;
            text-transform: uppercase;
        }

        .time-input {
            width: 100%;
            background: #fff5f5;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 5px;
            border-radius: 4px;
            font-size: 12px;
            height: 30px;
        }

        .off-checkbox {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: var(--text-dim);
            cursor: pointer;
            margin-top: 4px;
            user-select: none;
        }

        .is-off { opacity: 0.4; background: #f3f4f6; }

        .settings-panel {
            display: none;
            background: #fff1f2;
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 25px;
        }

        .settings-group { margin-bottom: 15px; }
        .settings-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #9d174d; font-size: 14px;}

        .input-text {
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
            width: 100%;
            max-width: 240px;
            margin-bottom: 8px;
            display: block;
        }

        .worker-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 5px;
            border: 1px solid var(--border);
            max-width: 300px;
        }

        .btn-danger { background: #ef4444; padding: 4px 8px; font-size: 11px; }
        .btn-danger:hover { background: #dc2626; }

        /* Modal Design Optimized for Mobile Screens */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .modal-content {
            background: white;
            padding: 16px;
            border-radius: 16px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            color: #9d174d;
        }

        .close-btn { font-size: 28px; font-weight: bold; color: var(--text-dim); cursor: pointer; }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            text-align: center;
        }

        .calendar-day-header {
            font-size: 10px;
            font-weight: bold;
            color: var(--accent);
            padding: 4px 0;
            text-transform: uppercase;
        }

        .calendar-cell {
            background: #fff5f5;
            border: 1px solid var(--border);
            border-radius: 6px;
            min-height: 48px;
            padding: 2px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .cell-num { font-size: 10px; font-weight: bold; color: var(--text-dim); text-align: left; }

        .cell-hrs {
            font-size: 9px;
            font-weight: 800;
            color: #10b981;
            text-align: center;
            background: white;
            border-radius: 4px;
            padding: 1px 0;
            border: 1px solid #fbcfe8;
        }

        .cell-empty { background: transparent; border: none; }
        .save-indicator { font-size: 11px; color: #10b981; font-weight: bold; margin-left: 8px; display: none; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="header">
            <div>
                <h1>🎀 Aura Board Games</h1>
                <p style="margin: 2px 0 0 0; color: var(--text-dim); font-size: 13px;">Live Schedule Dashboard</p>
            </div>
            <div class="nav-controls">
                <span id="save-status" class="save-indicator">✓ Auto-saved</span>
                <button class="btn-settings" onclick="toggleSettings()">⚙️ Settings</button>
            </div>
        </div>

        <!-- Hidden Settings Menu -->
        <div id="settings-panel" class="settings-panel">
            <h2 style="color: #9d174d; margin-top: 0; font-size: 16px;">Settings</h2>
            <hr style="border: none; border-top: 1px dashed var(--border); margin-bottom: 15px;">
            
            <div class="settings-group">
                <label>Minimum Target Hours / Month:</label>
                <input type="number" id="min-hours-input" class="input-text" value="120" onchange="updateMinHours(this.value)">
            </div>

            <div class="settings-group">
                <label>Add Team Member:</label>
                <input type="text" id="new-name-input" class="input-text" placeholder="Name...">
                <button onclick="addEmployee()">Add Member</button>
            </div>

            <div class="settings-group">
                <label>Active Roster:</label>
                <div id="settings-worker-list"></div>
            </div>
        </div>

        <div class="week-nav-bar">
            <div class="week-btn-group">
                <button onclick="changeWeek(-4)">⏮ Mo</button>
                <button onclick="changeWeek(-1)">◀ Wk</button>
            </div>
            <div class="week-display" id="week-label">Loading week...</div>
            <div class="week-btn-group">
                <button onclick="changeWeek(1)">Wk ▶</button>
                <button onclick="changeWeek(4)">Mo ⏭</button>
            </div>
        </div>

        <div id="schedule-container"></div>
    </div>

    <!-- Calendar Overview Pop-Up Modal -->
    <div id="calendar-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title" style="margin:0; font-size: 16px;">Employee Calendar</h3>
                <span class="close-btn" onclick="closeModal()">&times;</span>
            </div>
            <div id="modal-month-name" style="font-weight: bold; color: var(--accent); margin-bottom: 12px; font-size: 13px;"></div>
            <div class="calendar-grid" id="modal-calendar-grid"></div>
        </div>
    </div>

    <script>
        let employees = JSON.parse(localStorage.getItem('aura_employees')) || ["Anna", "Christa", "Mira"];
        let minMonthlyHours = Number(localStorage.getItem('aura_min_hours')) || 120;
        
        const days = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
        let currentMonday = getMonday(new Date());

        function getMonday(d) {
            d = new Date(d);
            let day = d.getDay(),
                diff = d.getDate() - day + (day == 0 ? -6 : 1); 
            return new Date(d.setDate(diff));
        }

        function formatDate(date) {
            return date.toISOString().split('T')[0];
        }

        function updateWeekLabel() {
            const endOfWeek = new Date(currentMonday);
            endOfWeek.setDate(endOfWeek.getDate() + 6);
            document.getElementById('week-label').innerText = `📅 ${currentMonday.toLocaleDateString(undefined, {month: 'short', day: 'numeric'})} - ${endOfWeek.toLocaleDateString(undefined, {month: 'short', day: 'numeric', year: 'numeric'})}`;
        }

        function calculateHours(fromStr, toStr, isOff) {
            if (isOff || !fromStr || !toStr) return 0;
            const [fromH, fromM] = fromStr.split(':').map(Number);
            const [toH, toM] = toStr.split(':').map(Number);
            let diffMs = (new Date(2000, 0, 1, toH, toM)) - (new Date(2000, 0, 1, fromH, fromM));
            if (diffMs < 0) diffMs += 24 * 60 * 60 * 1000;
            return parseFloat((diffMs / (1000 * 60 * 60)).toFixed(2));
        }

        function getHoursForExactDate(employeeName, targetDate) {
            const tempMon = getMonday(targetDate);
            const weekKey = `schedule_${formatDate(tempMon)}`;
            const savedData = JSON.parse(localStorage.getItem(weekKey));
            if (!savedData) return 0;

            const dayIndex = targetDate.getDay();
            const dayNamesLookup = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
            const dayName = dayNamesLookup[dayIndex];

            const dayData = savedData[`${employeeName}_${dayName}`];
            if (!dayData) return 0;
            return calculateHours(dayData.from, dayData.to, dayData.off);
        }

        function getMonthHours(employeeName) {
            let totalMonthHours = 0;
            const targetMonth = currentMonday.getMonth();
            const targetYear = currentMonday.getFullYear();

            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith("schedule_")) {
                    const dateStr = key.replace("schedule_", "");
                    const keyDate = new Date(dateStr);
                    
                    if (keyDate.getMonth() === targetMonth && keyDate.getFullYear() === targetYear) {
                        const savedData = JSON.parse(localStorage.getItem(key)) || {};
                        days.forEach(day => {
                            const dayKey = `${employeeName}_${day}`;
                            const dayData = savedData[dayKey];
                            if (dayData) {
                                totalMonthHours += calculateHours(dayData.from, dayData.to, dayData.off);
                            }
                        });
                    }
                }
            }
            return totalMonthHours;
        }

        function openCalendarView(emp) {
            const modal = document.getElementById('calendar-modal');
            document.getElementById('modal-title').innerText = `📊 ${emp}'s History`;
            
            const currentYear = currentMonday.getFullYear();
            const currentMonthIndex = currentMonday.getMonth();
            
            const monthLabel = currentMonday.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
            document.getElementById('modal-month-name').innerText = `Month Breakdown: ${monthLabel}`;

            const grid = document.getElementById('modal-calendar-grid');
            grid.innerHTML = '';

            const weekdaysMap = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
            weekdaysMap.forEach(h => {
                const head = document.createElement('div');
                head.className = 'calendar-day-header';
                head.innerText = h;
                grid.appendChild(head);
            });

            const firstDayOfMonth = new Date(currentYear, currentMonthIndex, 1);
            const lastDayOfMonth = new Date(currentYear, currentMonthIndex + 1, 0);
            
            let startDayOffset = firstDayOfMonth.getDay() - 1;
            if (startDayOffset < 0) startDayOffset = 6;

            for (let i = 0; i < startDayOffset; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'calendar-cell cell-empty';
                grid.appendChild(emptyCell);
            }

            const totalDays = lastDayOfMonth.getDate();
            for (let dayNum = 1; dayNum <= totalDays; dayNum++) {
                const evalDate = new Date(currentYear, currentMonthIndex, dayNum);
                const dayHours = getHoursForExactDate(emp, evalDate);

                const cell = document.createElement('div');
                cell.className = 'calendar-cell';
                
                let hourTagHtml = '';
                if (dayHours > 0) {
                    hourTagHtml = `<div class="cell-hrs">${dayHours}h</div>`;
                }

                cell.innerHTML = `
                    <div class="cell-num">${dayNum}</div>
                    ${hourTagHtml}
                `;
                grid.appendChild(cell);
            }

            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('calendar-modal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('calendar-modal');
            if (event.target == modal) { modal.style.display = 'none'; }
        }

        function saveStateAutomatically() {
            const currentWeekKey = `schedule_${formatDate(currentMonday)}`;
            const dataToSave = {};
            
            employees.forEach(emp => {
                days.forEach(day => {
                    const dayKey = `${emp}_${day}`;
                    const fromEl = document.getElementById(`from_${dayKey}`);
                    const toEl = document.getElementById(`to_${dayKey}`);
                    const offEl = document.getElementById(`off_${dayKey}`);
                    
                    if (fromEl && toEl && offEl) {
                        dataToSave[dayKey] = {
                            from: fromEl.value,
                            to: toEl.value,
                            off: offEl.checked
                        };
                    }
                });
            });

            localStorage.setItem(currentWeekKey, JSON.stringify(dataToSave));
            
            // Show custom temporary auto-save message fluidly
            const statusLabel = document.getElementById('save-status');
            statusLabel.style.display = 'inline';
            setTimeout(() => { statusLabel.style.display = 'none'; }, 1000);
        }

        function updateLiveHours(emp) {
            let weeklyTotal = 0;
            days.forEach(day => {
                const dayKey = `${emp}_${day}`;
                const offChecked = document.getElementById(`off_${dayKey}`).checked;
                const fromVal = document.getElementById(`from_${dayKey}`).value;
                const toVal = document.getElementById(`to_${dayKey}`).value;
                weeklyTotal += calculateHours(fromVal, toVal, offChecked);
            });
            document.getElementById(`weekly_total_${emp}`).innerText = weeklyTotal.toFixed(1);
            
            saveStateAutomatically();
            
            // Update monthly numbers instantly on change
            const monthTotal = getMonthHours(emp);
            document.getElementById(`monthly_total_${emp}`).innerText = monthTotal.toFixed(1);
            
            const extraTime = monthTotal - minMonthlyHours;
            const bankEl = document.getElementById(`bank_total_${emp}`);
            bankEl.innerText = (extraTime >= 0 ? '+' : '') + extraTime.toFixed(1);
            bankEl.className = extraTime >= 0 ? 'overtime-pos' : 'overtime-neg';
        }

        function renderSchedule() {
            updateWeekLabel();
            document.getElementById('min-hours-input').value = minMonthlyHours;
            const container = document.getElementById('schedule-container');
            container.innerHTML = '';

            const currentWeekKey = `schedule_${formatDate(currentMonday)}`;
            const savedData = JSON.parse(localStorage.getItem(currentWeekKey)) || {};

            employees.forEach(emp => {
                const empRow = document.createElement('div');
                empRow.className = 'employee-row';
                
                let weeklyTotalInitial = 0;
                days.forEach(day => {
                    const dayKey = `${emp}_${day}`;
                    if (!savedData[dayKey]) {
                        savedData[dayKey] = { from: "15:00", to: "01:00", off: false };
                    }
                    const dayData = savedData[dayKey];
                    weeklyTotalInitial += calculateHours(dayData.from, dayData.to, dayData.off);
                });

                const monthTotal = getMonthHours(emp);
                const extraTime = monthTotal - minMonthlyHours;
                const overtimeClass = extraTime >= 0 ? 'overtime-pos' : 'overtime-neg';
                const overtimePrefix = extraTime >= 0 ? '+' : '';

                empRow.innerHTML = `
                    <div class="employee-header">
                        <div class="employee-name" onclick="openCalendarView('${emp}')" title="View profile calendar">👤 ${emp}</div>
                        <div class="employee-stats">
                            <div class="stat-badge">Week: <span id="weekly_total_${emp}">${weeklyTotalInitial.toFixed(1)}</span> h</div>
                            <div class="stat-badge">Month: <span id="monthly_total_${emp}">${monthTotal.toFixed(1)}</span>/${minMonthlyHours} h</div>
                            <div class="stat-badge">Bank: <span id="bank_total_${emp}" class="${overtimeClass}">${overtimePrefix}${extraTime.toFixed(1)}</span> h</div>
                        </div>
                    </div>
                `;

                const grid = document.createElement('div');
                grid.className = 'grid-days';

                days.forEach(day => {
                    const dayKey = `${emp}_${day}`;
                    const dayData = savedData[dayKey];

                    const dayBox = document.createElement('div');
                    dayBox.className = `day-box ${dayData.off ? 'is-off' : ''}`;
                    dayBox.id = `box_${dayKey}`;

                    dayBox.innerHTML = `
                        <div class="day-label">${day}</div>
                        <input type="time" class="time-input" id="from_${dayKey}" value="${dayData.from}" ${dayData.off ? 'disabled' : ''} onchange="updateLiveHours('${emp}')">
                        <input type="time" class="time-input" id="to_${dayKey}" value="${dayData.to}" ${dayData.off ? 'disabled' : ''} onchange="updateLiveHours('${emp}')">
                        <label class="off-checkbox">
                            <input type="checkbox" id="off_${dayKey}" ${dayData.off ? 'checked' : ''} onchange="toggleOff('${dayKey}', '${emp}')"> Day Off
                        </label>
                    `;
                    grid.appendChild(dayBox);
                });

                empRow.appendChild(grid);
                container.appendChild(empRow);
            });

            renderSettingsWorkerList();
        }

        function toggleOff(dayKey, emp) {
            const isChecked = document.getElementById(`off_${dayKey}`).checked;
            const dayBox = document.getElementById(`box_${dayKey}`);
            const fromInput = document.getElementById(`from_${dayKey}`);
            const toInput = document.getElementById(`to_${dayKey}`);

            if (isChecked) {
                dayBox.classList.add('is-off');
                fromInput.disabled = true;
                toInput.disabled = true;
            } else {
                dayBox.classList.remove('is-off');
                fromInput.disabled = false;
                toInput.disabled = false;
            }
            updateLiveHours(emp);
        }

        function changeWeek(weeks) {
            currentMonday.setDate(currentMonday.getDate() + (weeks * 7));
            renderSchedule();
        }

        function toggleSettings() {
            const panel = document.getElementById('settings-panel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        function updateMinHours(val) {
            minMonthlyHours = Number(val) || 0;
            localStorage.setItem('aura_min_hours', minMonthlyHours);
            renderSchedule();
        }

        function addEmployee() {
            const input = document.getElementById('new-name-input');
            const name = input.value.trim();
            if (name && !employees.includes(name)) {
                employees.push(name);
                localStorage.setItem('aura_employees', JSON.stringify(employees));
                input.value = '';
                renderSchedule();
            }
        }

        function removeEmployee(name) {
            if (confirm(`Remove ${name} from the roster?`)) {
                employees = employees.filter(e => e !== name);
                localStorage.setItem('aura_employees', JSON.stringify(employees));
                renderSchedule();
            }
        }

        function renderSettingsWorkerList() {
            const listDiv = document.getElementById('settings-worker-list');
            listDiv.innerHTML = '';
            employees.forEach(emp => {
                const item = document.createElement('div');
                item.className = 'worker-list-item';
                item.innerHTML = `
                    <span>${emp}</span>
                    <button class="btn-danger" onclick="removeEmployee('${emp}')">Delete</button>
                `;
                listDiv.appendChild(item);
            });
        }

        renderSchedule();
    </script>
</body>
</html>
